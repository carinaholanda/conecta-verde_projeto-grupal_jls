<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conecta Verde</title>
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="enviar.css">
</head>
<body>
    <header>
        <div class="header-content">
            <img src="img/logobranca.png" alt="logo conecta verde"
                style="width:160px;">

            <button id="btn-menu">☰</button>
            <nav id="menu-lateral" class="menu-fechado">
                <a href="index.html">Feed</a>
                <a href="profile.html">Perfil</a>
                <a href="ranking.html">Ranking</a>
            </nav>
        </div>
    </header>

    <div class="card">
        <h2>Minha Ação Sustentável</h2>


        
<!-- {% if erro %}
     <div class="mensagem-erro">
    ⚠️ {{ erro }}
    </div>
    {% endif %}  
-->

        <form action="enviar.html" method="POST" enctype="multipart/form-data"> 
            
            <label for="descricao">O que você mudou hoje? (Ex: 5S na bancada)</label>
            <textarea id="descricao" name="descricao" rows="4" placeholder="Descreva brevemente sua ação sustentável..." required></textarea>
            
            <label for="foto">Anexe sua foto (Antes/Depois)</label>
            <input type="file" id="foto" name="foto" accept="image/*" required>
            
            <div id="image-preview"></div>
            
            <button type="submit">Enviar para Avaliação</button>
        
        </form>
    </div>

<script src="main.js"></script>
</body>
</html>
